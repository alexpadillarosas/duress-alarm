# ==============================================================================
# APPLICATION METADATA & CONFIGURATION GENERALS
# ==============================================================================
app.version=${quarkus.application.version}
quarkus.jackson.fail-on-unknown-properties=false

# ==============================================================================
# QUARKUS HTTP ENGINE PORTS (Centralized)
# ==============================================================================
# Fallback / Production Port
quarkus.http.port=8086

# Dev Mode Port Override
%dev.quarkus.http.port=8085

# Test Suite Profile Port Overrides
%test.quarkus.http.port=8081
#%test.quarkus.http.test-port=8086

# ==============================================================================
# WEBSOCKET ROUTING CONFIGURATION
# ==============================================================================
app.websocket.alerts=alert
app.websocket.alerts.path=/${app.websocket.alerts}
app.websocket.monitors=monitor
app.websocket.monitor.path=/${app.websocket.monitors}
app.websocket.base.path=/ws

# ==============================================================================
# SECURITY: RATE LIMITING PROFILE ENFORCEMENT
# ==============================================================================
app.security.ratelimit.limit=500
app.security.ratelimit.window-seconds=1
app.security.ratelimit.enabled=true

%dev.app.security.ratelimit.limit=5000
%test.app.security.ratelimit.enabled=false

# ==============================================================================
# LOGGING STRATEGY (Centralized)
# ==============================================================================
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=DEBUG



# Force native framework utility classes to remain quiet unless warnings pop up
quarkus.log.category."jdk.event.security".level=INFO
quarkus.log.category."org.jose4j".level=INFO
quarkus.log.category."io.quarkus".level=INFO
# ==============================================================================
# JACOCO CODE COVERAGE METRICS (%test ONLY)
# ==============================================================================
%test.quarkus.jacoco.excludes=com/safetycarealert/dto/**,com/safetycarealert/entity/**
%test.quarkus.jacoco.report-location=jacoco-report
%test.quarkus.jacoco.reuse-data-file=true

# ==============================================================================
# JWT AUTHENTICATION: ISSUANCE, SIGNING, AND AUTOMATIC VERIFICATION
# ==============================================================================
jwt.issuer=https://safetycarealert.com/issuer
smallrye.jwt.path.groups=groups

# --- PRODUCTION/PROD PROFILE SECURITY RULES ---
# In production, configuration values fallback to variables injected by your cluster engine environment.

%prod.mp.jwt.verify.issuer=${PROD_JWT_ISSUER:https://safetycarealert.com/issuer}
%prod.mp.jwt.verify.publickey.location=${PROD_PUBLIC_KEY_URL:file:/etc/secrets/publicKey.pem}
%prod.smallrye.jwt.sign.key.location=${PROD_PRIVATE_KEY_PATH:file:/etc/secrets/privateKey.pem}

# ==========================================================
# LOCAL DEVELOPMENT & TESTING
# Leave blank! Quarkus Dev Services handles in-memory keys automatically.
# it uses quarkus-smallrye-jwt extension, which features built-in Quarkus Dev Services
# that handle token security automatically
# ==========================================================

# --- LOCAL DEVELOPMENT PROFILE (%dev) OVERRIDES ---
%dev.mp.jwt.verify.issuer=${jwt.issuer}
#commented out by alex
#%dev.mp.jwt.verify.publickey.location=keys/publicKey.pem
#%dev.smallrye.jwt.sign.key.location=keys/privateKey_pkcs8.pem

# --- UNIT/INTEGRATION TESTING PROFILE (%test) OVERRIDES ---
# Keep the engine turned on, pointing to local test resources
%test.mp.jwt.verify.issuer=${jwt.issuer}

#commented out by alex
#%test.mp.jwt.verify.publickey.location=keys/publicKey.pem
#%test.smallrye.jwt.sign.key.location=keys/privateKey_pkcs8.pem


# ==============================================================================
# ROLE-BASED ACCESS CONTROL (RBAC) FOR WEBSOCKET PATHS
# ==============================================================================
quarkus.http.auth.permission.public.paths=/auth/token
quarkus.http.auth.permission.public.policy=permit

quarkus.http.auth.policy.monitor-policy.roles-allowed=MONITOR,ADMIN,SUPPORT
quarkus.http.auth.permission.monitor.paths=/ws/*/monitor
quarkus.http.auth.permission.monitor.policy=monitor-policy

quarkus.http.auth.policy.alert-policy.roles-allowed=DEVICE
quarkus.http.auth.permission.alert.paths=/ws/*/alert
quarkus.http.auth.permission.alert.policy=alert-policy

# ==============================================================================
# DATABASE CONFIGURATION & DATASOURCE POOLING
# ==============================================================================
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.additional-jdbc-properties.busy_timeout=5000
quarkus.hibernate-orm.validation.mode=none
quarkus.hibernate-orm.log.sql=true

# Flyway Settings
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
quarkus.flyway.table=flyway_schema_history

# --- PROD Settings ---
# make sure to place here the path where the prod db file will be
%prod.quarkus.datasource.jdbc.url=jdbc:sqlite:/var/data/safety.db
%prod.quarkus.hibernate-orm.schema-management.strategy=none

# --- DEV Settings ---
#%dev.quarkus.datasource.jdbc.url=jdbc:sqlite:dev_safety.db
%dev.quarkus.datasource.jdbc.url=jdbc:sqlite:../dev_safety.db
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.clean-at-start=false
%dev.quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.hibernate-orm.validate-in-dev-mode=false
%dev.quarkus.hibernate-orm.log.sql=true
#%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
#%dev.quarkus.hibernate-orm.sql-load-script=import.sql

# --- TEST PROFILE DATASOURCE RESOLUTIONS  ---
# Replaces memory database connection string loops with a fast, volatile local cache file.
#%test.quarkus.datasource.jdbc.url=jdbc:sqlite:target/test_safety.db
%test.quarkus.datasource.db-kind=sqlite
%test.quarkus.datasource.jdbc.url=jdbc:sqlite::memory
%test.quarkus.hibernate-orm.schema-management.strategy=none
%test.quarkus.hibernate-orm.validate-in-dev-mode=false
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.flyway.migrate-at-start=true
